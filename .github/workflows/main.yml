name: Portable Python Unit Tests

# This tells GitHub to run the script every time you push code
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  portable:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Python
      uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install --no-compile -r requirements.txt
        python -m pip install --no-compile pytest

    # These modules require ignored governed evidence, source-lake authorities, installed-artifact
    # closure, or visible CUDA. They are exercised by the separate full local seal verification.
    - name: Run portable tests
      env:
        PYTHONDONTWRITEBYTECODE: '1'
      run: |
        pytest \
          --ignore=tests/test_corpus_v3.py \
          --ignore=tests/test_corpus_v3_export.py \
          --ignore=tests/test_corpus_v3_session_audit.py \
          --ignore=tests/test_native_configuration_audit.py \
          --ignore=tests/test_native_contracts.py \
          --ignore=tests/test_native_route_pilot.py \
          --ignore=tests/test_native_route_smoke.py \
          --ignore=tests/test_native_training_readiness.py
